<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Campus Event Management</title>
  <link rel="stylesheet" href="style.css" />

</head>
<body>

  <header>
    <h1>Campus Event Management</h1>
  </header>

  <main>
    <!-- Create Event -->
    <section class="card">
      <h2>Create Event</h2>

      <input type="text" id="eventName" placeholder="Event Name" />
      <input type="text" id="clubName" placeholder="Club Name" />
      <input type="date" id="eventDate" />
      <input type="number" id="capacity" placeholder="Capacity" />

      <button onclick="createEvent()">Create Event</button>
    </section>

    <!-- Events List -->
    <section class="card">
      <h2>Upcoming Events</h2>
      <ul id="eventList"></ul>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
